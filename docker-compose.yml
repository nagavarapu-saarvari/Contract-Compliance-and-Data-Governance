services:
  db:
    image: postgres:15
    container_name: compliance_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contract_compliance
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: compliance_app
    restart: always
    ports:
      - "8001:8001"
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - backend/.env

volumes:
  postgres_data: